<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bharat Bytes - Under Maintenance</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    height: 100vh;
    font-family: Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;

    /* 🔥 BACKGROUND IMAGE */
    background: url('man.png') no-repeat center center/cover;
    position: relative;
    color: white;
  }

  /* Dark overlay for readability */
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
  }

  .container {
    position: relative;
    text-align: center;
    padding: 20px;
  }

  h1 {
    font-size: 2.5rem;
    margin-bottom: 15px;
    letter-spacing: 2px;
  }

  p {
    font-size: 1.1rem;
    margin-bottom: 25px;
    opacity: 0.9;
  }

  .btn {
    display: inline-block;
    padding: 12px 24px;
    background: #ff2d78;
    color: white;
    text-decoration: none;
    border-radius: 30px;
    font-weight: bold;
    transition: 0.3s;
  }

  .btn:hover {
    background: #ff0055;
  }

  @media (max-width: 600px) {
    h1 {
      font-size: 1.8rem;
    }
    p {
      font-size: 1rem;
    }
  }
</style>
</head>

<body>

<div class="container">
  <h1>🚧 Website Under Maintenance</h1>
  <p>
    We’re upgrading your experience.<br>
    Scent Verse will be back shortly.<br>
           Check again soon.
  </p>

  <a href="https://bharatytesofficial2-code.github.io/bharatbytes/" class="btn">-Powered by BHARAT BYTES</a>
</div>

</body>
</html>
