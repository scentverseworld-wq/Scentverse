<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScentVerse | Maintenance</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(rgba(15,23,42,0.85), rgba(30,41,59,0.85)), url('man.png') center/cover no-repeat;
      color: #fff;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      max-width: 500px;
    }

    .logo {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 2px;
      color: #38bdf8;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      color: #cbd5f5;
      margin-bottom: 30px;
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 6px solid rgba(255,255,255,0.1);
      border-top: 6px solid #38bdf8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 25px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #94a3b8;
    }

    .footer span {
      color: #38bdf8;
      font-weight: 500;
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="logo">ScentVerse</div>
    <div class="loader"></div>
    <h1>Website Under Maintenance</h1>
    <p>We're upgrading your experience. We'll be back shortly with something better.</p>
    <div class="footer">Powered by <span>Bharat Bytes</span></div>
  </div>

</body>
</html>
