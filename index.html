<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maintenance | Scent Verse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff2d78, #7b3fe4);
      color: white;
      text-align: center;
    }

    .container {
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 15px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      opacity: 0.9;
    }

    .brand {
      margin-top: 20px;
      font-weight: bold;
      letter-spacing: 1px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚧 Website Under Maintenance</h1>
    
    <p>
      The website server is currently under maintenance.<br>
      We are working to improve your experience.<br>
      Please check back again soon.
    </p>

    <div class="brand">
      — Powered by BHARAT Bytes
    </div>
  </div>

</body>
</html>
